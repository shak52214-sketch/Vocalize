kind = "web"
previewPath = "/"
title = "Vocalize"
version = "1.0.0"
id = "artifacts/vocalize"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25827

[services.development]
run = "pnpm --filter @workspace/vocalize run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vocalize", "run", "build" ]
publicDir = "artifacts/vocalize/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25827"
BASE_PATH = "/"
